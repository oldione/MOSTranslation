  <div id="__pw_gate" style="position:fixed;inset:0;z-index:100000;background:#F7F4ED;display:flex;align-items:center;justify-content:center;">
    <form id="__pw_form" style="display:flex;flex-direction:column;gap:14px;align-items:center;width:280px;">
      <div style="font-family:Georgia,serif;font-size:28px;color:#211D15;">MOS Translation</div>
      <input id="__pw_input" type="password" placeholder="Пароль" autocomplete="off" style="width:100%;padding:12px 14px;font-size:16px;border:1px solid #C9C2B4;border-radius:8px;background:#fff;color:#211D15;outline:none;">
      <button type="submit" style="width:100%;padding:12px;font-size:16px;border:none;border-radius:8px;background:#7A2E2E;color:#fff;cursor:pointer;">Войти</button>

    </form>

  <script>
    window.__pwReady = new Promise(function(resolve){
      var gate = document.getElementById('__pw_gate');
      if (sessionStorage.getItem('__mos_pw_ok') === '1') { gate.remove(); resolve(); return; }
      document.getElementById('__pw_form').addEventListener('submit', function(e){
        e.preventDefault();
        if (document.getElementById('__pw_input').value === 'MOStrans123') {
          sessionStorage.setItem('__mos_pw_ok', '1');
          gate.remove();
          resolve();
        } else {
          document.getElementById('__pw_err').style.visibility = 'visible';
        }
      });
    });

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  if (window.__pwReady) { await window.__pwReady; }
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

le=\"font-family:'Cormorant Garamond',serif;font-size:24px;color:#F7F4ED\">от 2 500 RSD/стр<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:16px 0;border-bottom:1px solid rgba(247,244,237,.15)\"><span style=\"font-size:15px;color:rgba(247,244,237,.85)\">Апостиль (пошлина отдельно)<\u002Fspan><span style=\"font-family:'Cormorant Garamond',serif;font-size:24px;color:#F7F4ED\">100 EUR<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:22px;font-size:13px;line-height:1.7;color:rgba(247,244,237,.5)\">Договоры и большие тексты — по знакам: 1 800 знаков с пробелами = 1 страница.<br>Срочный перевод в течение 24 часов — коэффициент ×2.<\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"calc\" data-reveal=\"\" style=\"background:#F7F4ED;padding:34px 36px;display:flex;flex-direction:column;gap:18px;border-radius:2px;scroll-margin-top:110px;opacity:0;transform:translateY(28px);transition:opacity .9s .15s cubic-bezier(.2,.7,.2,1),transform .9s .15s cubic-bezier(.2,.7,.2,1)\">\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:26px;color:#211D15\">Калькулятор стоимости<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n          <label style=\"display:flex;flex-direction:column;gap:7px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#8A8474\">Языковая пара\n            <select value=\"{{ calc.pair }}\" onchange=\"{{ calc.setPair }}\" style=\"font-family:'Golos Text',sans-serif;font-size:15px;padding:12px;border:1px solid #C9C0AA;background:#fff;color:#211D15\">\n              <option value=\"ru-sr\">Русский ↔ Сербский<\u002Foption>\n              <option value=\"sr-en\">Сербский ↔ Английский<\u002Foption>\n              <option value=\"ru-en\">Русский ↔ Английский<\u002Foption>\n            <\u002Fselect>\n          <\u002Flabel>\n          <label style=\"display:flex;flex-direction:column;gap:7px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#8A8474\">Тип документа\n            <select value=\"{{ calc.type }}\" onchange=\"{{ calc.setType }}\" style=\"font-family:'Golos Text',sans-serif;font-size:15px;padding:12px;border:1px solid #C9C0AA;background:#fff;color:#211D15\">\n              <option value=\"std\">Свидетельства / дипломы / справки<\u002Foption>\n              <option value=\"contract\">Договор / большой текст (по знакам)<\u002Foption>\n              <option value=\"med\">Медицинские тексты<\u002Foption>\n              <option value=\"spec\">Спец-тексты<\u002Foption>\n            <\u002Fselect>\n          <\u002Flabel>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:end\">\n          <sc-if value=\"{{ calc.isContract }}\" hint-placeholder-val=\"{{ false }}\">\n            <label style=\"display:flex;flex-direction:column;gap:7px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#8A8474\">Знаков с пробелами\n              <input type=\"number\" min=\"1\" value=\"{{ calc.chars }}\" onchange=\"{{ calc.setChars }}\" style=\"font-family:'Golos Text',sans-serif;font-size:15px;padding:12px;border:1px solid #C9C0AA;background:#fff;color:#211D15\">\n            <\u002Flabel>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ calc.notContract }}\" hint-placeholder-val=\"{{ true }}\">\n            <label style=\"display:flex;flex-direction:column;gap:7px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#8A8474\">Количество страниц\n              <input type=\"number\" min=\"1\" value=\"{{ calc.pages }}\" onchange=\"{{ calc.setPages }}\" style=\"font-family:'Golos Text',sans-serif;font-size:15px;padding:12px;border:1px solid #C9C0AA;background:#fff;color:#211D15\">\n            <\u002Flabel>\n          <\u002Fsc-if>\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:14px;color:#211D15;padding:12px 0;cursor:pointer\">\n            <input type=\"checkbox\" checked=\"{{ calc.urgent }}\" onchange=\"{{ calc.toggleUrgent }}\" style=\"width:18px;height:18px;accent-color:#7A2E2E\">\n            Срочно, 24 часа (×2)\n          <\u002Flabel>\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid #E5DFD0;padding-top:18px;display:flex;align-items:baseline;justify-content:space-between\">\n          <div style=\"font-size:13px;color:#8A8474\">{{ calc.summary }}<\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:36px;color:#7A2E2E\">{{ calc.total }}<\u002Fdiv>\n        <\u002Fdiv>\n        <a href=\"mailto:melodyofspeech@gmail.com\" style=\"background:#7A2E2E;color:#F7F4ED;text-align:center;font-weight:600;font-size:15px;padding:15px;text-decoration:none;border-radius:2px;transition:background .3s\" style-hover=\"background:#5E2222\">Отправить документ на точный расчёт<\u002Fa>\n        <div style=\"font-size:12px;color:#9A9382;text-align:center\">Расчёт предварительный. Ответим в течение 10 минут.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- steps: sticky stacking cards -->\n  <div style=\"padding:84px 56px 100px\">\n    <div style=\"display:grid;grid-template-columns:.85fr 2fr;gap:56px;align-items:start\">\n      <div style=\"position:sticky;top:130px\">\n        <div style=\"font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:#7A2E2E;margin-bottom:14px\">Как это работает<\u002Fdiv>\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:600;color:#211D15;margin:0 0 16px;line-height:1.1\">Как проходит заказ<\u002Fh2>\n        <p style=\"font-size:14.5px;line-height:1.65;color:#6B6452;margin:0 0 26px\">От заявки до готового перевода с синей печатью — обычно 1–3 дня. Листайте: каждый шаг — одна карточка.<\u002Fp>\n        <a href=\"mailto:melodyofspeech@gmail.com\" style=\"display:inline-block;background:#7A2E2E;color:#F7F4ED;font-weight:600;font-size:14px;padding:13px 24px;text-decoration:none;border-radius:2px;transition:background .3s\" style-hover=\"background:#5E2222\">Отправить документ<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:26px\">\n        <div style=\"position:sticky;top:110px;background:#fff;border:1px solid #E5DFD0;border-radius:2px;padding:44px 48px;min-height:300px;box-sizing:border-box;box-shadow:0 -18px 44px rgba(33,29,21,.10)\">\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n            <div style=\"font-family:'Cormorant Garamond',serif;font-size:92px;line-height:.9;color:#E5DFD0\">01<\u002Fdiv>\n            <div style=\"font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#7A2E2E;border:1px solid #E9D9D9;padding:6px 12px;border-radius:2px\">Шаг 1<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;color:#211D15;margin:22px 0 10px\">Заявка<\u002Fdiv>\n          <div style=\"font-size:15px;color:#6B6452;line-height:1.65;max-width:520px\">Отправьте документ через форму, Telegram или WhatsApp — как удобнее. Подойдут скан или фото с телефона.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:sticky;top:128px;background:#fff;border:1px solid #E5DFD0;border-radius:2px;padding:44px 48px;min-height:300px;box-sizing:border-box;box-shadow:0 -18px 44px rgba(33,29,21,.10)\">\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n            <div style=\"font-family:'Cormorant Garamond',serif;font-size:92px;line-height:.9;color:#E5DFD0\">02<\u002Fdiv>\n            <div style=\"font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#7A2E2E;border:1px solid #E9D9D9;padding:6px 12px;border-radius:2px\">Шаг 2<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;color:#211D15;margin:22px 0 10px\">Ответ за 10 минут<\u002Fdiv>\n          <div style=\"font-size:15px;color:#6B6452;line-height:1.65;max-width:520px\">Менеджер посмотрит документ, назовёт точную стоимость и срок — до начала работы, без скрытых доплат.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:sticky;top:146px;background:#fff;border:1px solid #E5DFD0;border-radius:2px;padding:44px 48px;min-height:300px;box-sizing:border-box;box-shadow:0 -18px 44px rgba(33,29,21,.10)\">\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n            <div style=\"font-family:'Cormorant Garamond',serif;font-size:92px;line-height:.9;color:#E5DFD0\">03<\u002Fdiv>\n            <div style=\"font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#7A2E2E;border:1px solid #E9D9D9;padding:6px 12px;border-radius:2px\">Шаг 3<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;color:#211D15;margin:22px 0 10px\">Перевод<\u002Fdiv>\n          <div style=\"font-size:15px;color:#6B6452;line-height:1.65;max-width:520px\">Переводим, при необходимости выполняем вёрстку, печать и заверение синей печатью судебного переводчика.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:sticky;top:164px;background:#211D15;border:1px solid #211D15;border-radius:2px;padding:44px 48px;min-height:300px;box-sizing:border-box;box-shadow:0 -18px 44px rgba(33,29,21,.22)\">\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n            <div style=\"font-family:'Cormorant Garamond',serif;font-size:92px;line-height:.9;color:#7A2E2E\">04<\u002Fdiv>\n            <div style=\"font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#F7F4ED;border:1px solid rgba(247,244,237,.3);padding:6px 12px;border-radius:2px\">Шаг 4<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;color:#F7F4ED;margin:22px 0 10px\">Получение<\u002Fdiv>\n          <div style=\"font-size:15px;color:rgba(247,244,237,.75);line-height:1.65;max-width:520px\">В офисе или курьером. Оплата наличными или картой — RSD, EUR, RUB.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- seal: rolling wheel on a rail -->\n  <div id=\"seal-section\" style=\"background:#211D15;margin-bottom:84px\">\n    <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:64px;padding:0 56px\">\n      <div style=\"position:sticky;top:0;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden\">\n        <div style=\"position:relative;width:410px;background:#F7F4ED;box-shadow:0 40px 90px rgba(0,0,0,.5);padding:38px 40px 34px\">\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:#211D15\">MOS Translation<\u002Fdiv>\n          <div style=\"font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:#8A8474;margin:4px 0 18px\">Overeni prevod · Заверенный перевод<\u002Fdiv>\n          <div style=\"height:1px;background:#E5DFD0;margin-bottom:18px\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:20px\">\n            <div style=\"height:7px;background:#E5DFD0;width:96%\"><\u002Fdiv>\n            <div style=\"height:7px;background:#E5DFD0;width:88%\"><\u002Fdiv>\n            <div style=\"height:7px;background:#E5DFD0;width:93%\"><\u002Fdiv>\n            <div style=\"height:7px;background:#E5DFD0;width:60%\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div data-paper=\"0\" style=\"border:1px solid #C9C0AA;padding:12px 16px;margin-bottom:16px;opacity:0;transform:translateY(12px);transition:opacity .8s,transform .8s\">\n            <div style=\"font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#7A2E2E;margin-bottom:4px\">Реестр Минюста Сербии<\u002Fdiv>\n            <div style=\"font-size:13px;color:#211D15;font-weight:600\">№ 740-06-00973 · № 740-06-01248<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:relative;height:180px\">\n            <div data-paper=\"1\" style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:150px;height:150px;opacity:0;transition:opacity .6s\">\n              <svg viewBox=\"0 0 130 130\" style=\"width:100%;height:100%;transform:rotate(-7deg);opacity:.8\">\n                <circle cx=\"65\" cy=\"65\" r=\"62\" fill=\"none\" stroke=\"#35508C\" stroke-width=\"1.4\"><\u002Fcircle>\n                <circle cx=\"65\" cy=\"65\" r=\"44\" fill=\"none\" stroke=\"#35508C\" stroke-width=\"1\"><\u002Fcircle>\n                <path id=\"sealPathP\" d=\"M 65,14 a 51,51 0 1,1 -0.01,0\" fill=\"none\"><\u002Fpath>\n                <text style=\"font-size:10.5px;letter-spacing:.35em;fill:#35508C;font-family:'Golos Text',sans-serif\"><textPath href=\"#sealPathP\">SUDSKI TUMAČ · BEOGRAD · 740-06-00973 · <\u002FtextPath><\u002Ftext>\n                <text x=\"65\" y=\"70\" text-anchor=\"middle\" style=\"font-size:13px;font-family:'Cormorant Garamond',serif;fill:#35508C;letter-spacing:.08em\">MOS<\u002Ftext>\n              <\u002Fsvg>\n            <\u002Fdiv>\n            <div id=\"stamp-seal\" style=\"position:absolute;left:50%;top:50%;width:150px;height:150px;z-index:2;transform:translate(-50%,-50%) translateY(-150px) rotate(-5deg);animation:sealBob 5s ease-in-out infinite;filter:drop-shadow(0 18px 22px rgba(0,0,0,.35))\">\n              <svg viewBox=\"0 0 130 130\" style=\"width:100%;height:100%\">\n                <circle cx=\"65\" cy=\"65\" r=\"62\" fill=\"#211D15\" stroke=\"#C05B41\" stroke-width=\"1.4\"><\u002Fcircle>\n                <circle cx=\"65\" cy=\"65\" r=\"44\" fill=\"none\" stroke=\"#C05B41\" stroke-width=\"1\"><\u002Fcircle>\n                <path id=\"sealPathS\" d=\"M 65,14 a 51,51 0 1,1 -0.01,0\" fill=\"none\"><\u002Fpath>\n                <text style=\"font-size:10.5px;letter-spacing:.35em;fill:#C05B41;font-family:'Golos Text',sans-serif\"><textPath href=\"#sealPathS\">SUDSKI TUMAČ · BEOGRAD · 740-06-00973 · <\u002FtextPath><\u002Ftext>\n                <text x=\"65\" y=\"70\" text-anchor=\"middle\" style=\"font-size:13px;font-family:'Cormorant Garamond',serif;fill:#F7F4ED;letter-spacing:.08em\">MOS<\u002Ftext>\n              <\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div data-paper=\"2\" style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;opacity:0;transform:translateY(12px);transition:opacity .8s,transform .8s\">\n            <span style=\"font-size:11px;letter-spacing:.08em;color:#3F3A2E;border:1px solid #C9C0AA;padding:5px 10px;border-radius:100px\">Нотариус ✓<\u002Fspan>\n            <span style=\"font-size:11px;letter-spacing:.08em;color:#3F3A2E;border:1px solid #C9C0AA;padding:5px 10px;border-radius:100px\">Суд ✓<\u002Fspan>\n            <span style=\"font-size:11px;letter-spacing:.08em;color:#3F3A2E;border:1px solid #C9C0AA;padding:5px 10px;border-radius:100px\">МУП ✓<\u002Fspan>\n            <span style=\"font-size:11px;letter-spacing:.08em;color:#3F3A2E;border:1px solid #C9C0AA;padding:5px 10px;border-radius:100px\">Банк ✓<\u002Fspan>\n            <span style=\"font-size:11px;letter-spacing:.08em;color:#3F3A2E;border:1px solid #C9C0AA;padding:5px 10px;border-radius:100px\">Визовый центр ✓<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:16vh 0 18vh\">\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:600;color:#F7F4ED;margin:0;line-height:1.15;max-width:520px\">Почему нашей печати доверяют<\u002Fh2>\n        <div data-step=\"\" data-step-idx=\"0\" style=\"min-height:52vh;display:flex;flex-direction:column;justify-content:center;opacity:.22;transition:opacity .7s\">\n          <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:12px\">\n            <span style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:#C05B41\">I<\u002Fspan>\n            <span style=\"font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:rgba(247,244,237,.5)\">Основание<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;color:#F7F4ED;margin-bottom:14px\">Лицензия Минюста Сербии<\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.7;color:rgba(247,244,237,.65);margin:0;max-width:520px\">Переводчик внесён в официальный реестр судебных переводчиков Республики Сербии. Две лицензии — № 740-06-00973 и № 740-06-01248 — дают право переводить русский, сербский и английский.<\u002Fp>\n        <\u002Fdiv>\n        <div data-step=\"\" style=\"min-height:52vh;display:flex;flex-direction:column;justify-content:center;border-top:1px dashed rgba(247,244,237,.18);opacity:.22;transition:opacity .7s\">\n          <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:12px\">\n            <span style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:#C05B41\">II<\u002Fspan>\n            <span style=\"font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:rgba(247,244,237,.5)\">Заверение<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;color:#F7F4ED;margin-bottom:14px\">Синяя печать и подпись<\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.7;color:rgba(247,244,237,.65);margin:0;max-width:520px\">Каждый экземпляр заверяется печатью sudski tumač. Именно она — а не печать нотариуса — придаёт переводу юридическую силу в Сербии.<\u002Fp>\n        <\u002Fdiv>\n        <div data-step=\"\" style=\"min-height:52vh;display:flex;flex-direction:column;justify-content:center;border-top:1px dashed rgba(247,244,237,.18);opacity:.22;transition:opacity .7s\">\n          <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:12px\">\n            <span style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:#C05B41\">III<\u002Fspan>\n            <span style=\"font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:rgba(247,244,237,.5)\">Признание<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;color:#F7F4ED;margin-bottom:14px\">Принимают везде<\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.7;color:rgba(247,244,237,.65);margin:0;max-width:520px\">Нотариусы, суды, МУП и миграционная служба, банки, страховые, визовые центры и консульства — в Сербии и за её пределами.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- team -->\n  <div id=\"team\" style=\"padding:0 56px 84px;scroll-margin-top:90px\">\n    <div data-reveal=\"\" style=\"text-align:center;margin-bottom:44px;opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\">\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:600;color:#211D15;margin:0 0 10px\">Наша команда<\u002Fh2>\n      <div style=\"font-size:15px;color:#8A8474;font-style:italic\">Самая главная ценность — это люди<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:36px;max-width:1080px;margin:0 auto\">\n      <div data-reveal=\"\" style=\"text-align:center;opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\">\n        <image-slot id=\"team-1b-ivan\" shape=\"circle\" placeholder=\"Фото Ивана\" style=\"width:190px;height:190px;display:block;margin:0 auto 18px\"><\u002Fimage-slot>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:24px;color:#211D15\">Иван<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#8A8474;line-height:1.55;margin-top:5px\">Судебный переводчик,<br>соучредитель MOS Translation<\u002Fdiv>\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:#7A2E2E;margin-top:10px\">Стаж 15 лет<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-stagger=\"2\" style=\"text-align:center;opacity:0;transform:translateY(28px);transition:opacity .9s .12s cubic-bezier(.2,.7,.2,1),transform .9s .12s cubic-bezier(.2,.7,.2,1)\">\n        <image-slot id=\"team-1b-elena\" shape=\"circle\" placeholder=\"Фото Елены\" style=\"width:190px;height:190px;display:block;margin:0 auto 18px\"><\u002Fimage-slot>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:24px;color:#211D15\">Елена<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#8A8474;line-height:1.55;margin-top:5px\">Директор, соучредитель<br>MOS Business Alliance<\u002Fdiv>\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:#7A2E2E;margin-top:10px\">Стаж 12 лет<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-stagger=\"3\" style=\"text-align:center;opacity:0;transform:translateY(28px);transition:opacity .9s .24s cubic-bezier(.2,.7,.2,1),transform .9s .24s cubic-bezier(.2,.7,.2,1)\">\n        <image-slot id=\"team-1b-ekaterina\" shape=\"circle\" placeholder=\"Фото Екатерины\" style=\"width:190px;height:190px;display:block;margin:0 auto 18px\"><\u002Fimage-slot>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:24px;color:#211D15\">Екатерина Волкова<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#8A8474;line-height:1.55;margin-top:5px\">Юрист — ВНЖ/ПМЖ,<br>доверенности, нотариат<\u002Fdiv>\n        <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:#7A2E2E;margin-top:10px\">Стаж 8 лет<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FAQ -->\n  <div style=\"padding:0 56px 84px\">\n    <div data-reveal=\"\" style=\"display:grid;grid-template-columns:.85fr 2fr;gap:56px;opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\">\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:600;color:#211D15;margin:0;line-height:1.1\">Частые вопросы<\u002Fh2>\n      <div style=\"border-top:1px solid #E5DFD0\">\n        <sc-for list=\"{{ faq }}\" as=\"f\" hint-placeholder-count=\"5\">\n          <div style=\"border-bottom:1px solid #E5DFD0\">\n            <div onclick=\"{{ f.toggle }}\" style=\"display:flex;align-items:baseline;gap:18px;padding:20px 0;cursor:pointer\">\n              <span style=\"flex:1;font-size:16.5px;font-weight:600;color:#211D15;transition:color .3s\" style-hover=\"color:#7A2E2E\">{{ f.q }}<\u002Fspan>\n              <span style=\"font-family:'Cormorant Garamond',serif;font-size:24px;color:#7A2E2E;transition:transform .35s;transform:{{ f.markTransform }}\">+<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-rows:{{ f.rows }};transition:grid-template-rows .45s cubic-bezier(.2,.7,.2,1)\">\n              <div style=\"overflow:hidden\">\n                <div style=\"padding:0 40px 22px 0;font-size:14.5px;line-height:1.7;color:#6B6452\">{{ f.a }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- contacts -->\n  <div id=\"contacts\" style=\"background:#fff;border-top:1px solid #E5DFD0;padding:76px 56px;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:stretch;scroll-margin-top:90px\">\n    <iframe src=\"https://www.google.com/maps?q=Kralja+Milutina+46,+Beograd,+Serbia&amp;hl=ru&amp;z=16&amp;output=embed\" style=\"width:100%;min-height:340px;border:1px solid #E5DFD0;filter:grayscale(1) sepia(.15)\"><\u002Fiframe>\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\">\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:600;color:#211D15;margin:0 0 22px\">Приходите или пишите<\u002Fh2>\n      <div style=\"font-size:16px;line-height:1.7;color:#3F3A2E\"><strong>Kralja Milutina 46, Белград<\u002Fstrong> — 100 метров от Посольства России<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:auto 1fr;gap:9px 26px;margin:22px 0;font-size:15px;color:#3F3A2E\">\n        <span style=\"color:#9A9382\">Пн–Сб<\u002Fspan><strong>09:00–20:00<\u002Fstrong>\n        <span style=\"color:#9A9382\">Воскресенье<\u002Fspan><strong>по записи<\u002Fstrong>\n        <span style=\"color:#9A9382\">Телефон<\u002Fspan><a href=\"{{ phoneHref }}\" style=\"color:#211D15;font-weight:700;text-decoration:none\">{{ phone }}<\u002Fa>\n        <span style=\"color:#9A9382\">E-mail<\u002Fspan><a href=\"mailto:melodyofspeech@gmail.com\" style=\"color:#211D15;text-decoration:none\">melodyofspeech@gmail.com<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:12px\">\n        <a href=\"https://t.me/Viktoria_rsb\" style=\"background:#211D15;color:#F7F4ED;font-weight:600;font-size:14px;padding:12px 22px;text-decoration:none;border-radius:2px;transition:background .3s\" style-hover=\"background:#7A2E2E\">Telegram<\u002Fa>\n        <a href=\"https://wa.me/38163338105\" style=\"background:#211D15;color:#F7F4ED;font-weight:600;font-size:14px;padding:12px 22px;text-decoration:none;border-radius:2px;transition:background .3s\" style-hover=\"background:#7A2E2E\">WhatsApp<\u002Fa>\n        <a href=\"mailto:melodyofspeech@gmail.com\" style=\"border:1px solid #C9C0AA;color:#211D15;font-weight:600;font-size:14px;padding:12px 22px;text-decoration:none;border-radius:2px;transition:border-color .3s\" style-hover=\"border-color:#211D15\">Отправить документ<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"margin-top:20px;font-size:12.5px;color:#9A9382\">Часы могут меняться в праздничные дни — уточняйте по телефону.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <footer style=\"background:#211D15;color:rgba(247,244,237,.55);padding:24px 56px;display:flex;justify-content:space-between;font-size:12.5px\">\n    <div>© 2026 MOS Translation · Melody of Speech<\u002Fdiv>\n    <div>Лицензии Минюста Сербии № 740-06-00973 · № 740-06-01248<\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;phone&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;+381 62 1254246&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Контакты&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    faqOpen: -1,\n    activeTab: 0,\n    tabTick: 0,\n    calc: { pair: 'ru-sr', type: 'std', pages: 1, chars: 1800, urgent: false }\n  };\n\n  static TABS = [\n    {\n      label: 'Частным лицам',\n      title: 'Документы для жизни в Сербии',\n      desc: 'ВНЖ и ПМЖ, свидетельства о рождении и браке, дипломы и аттестаты, справки, водительские права. Переводим и заверяем так, как требуют МУП, нотариусы и госорганы.',\n      pill: 'Личные документы · от 1 800 RSD/стр',\n      slotId: 'tab-private',\n      placeholder: 'Фото: клиент с документами'\n    },\n    {\n      label: 'Бизнесу',\n      title: 'Регистрация и работа компании',\n      desc: 'Открытие ИП и ДОО, уставные документы, договоры, банковские и финансовые бумаги. Считаем большие тексты по знакам — прозрачно и без сюрпризов.',\n      pill: 'Договоры · 1 800 знаков = 1 страница',\n      slotId: 'tab-business',\n      placeholder: 'Фото: подписание договора'\n    },\n    {\n      label: 'Суд и нотариус',\n      title: 'Устный перевод с выездом',\n      desc: 'Сопровождение к нотариусу, выезд судебного переводчика в суд и на допросы, присутствие на заключении брака. Печать и подпись имеют силу закона.',\n      pill: 'Выезд переводчика · по записи',\n      slotId: 'tab-court',\n      placeholder: 'Фото: у нотариуса'\n    }\n  ];\n\n  static SERVICES = [\n    ['Судебный перевод документов', 'RU / SR / EN, с синей печатью'],\n    ['Нострификация диплома, аттестата', 'Для ENIC/NARIC, учёбы и работы'],\n    ['Апостиль на документы', 'Легализация для других стран'],\n    ['Сопровождение к нотариусу', 'Выход судебного переводчика'],\n    ['Оформление доверенностей', 'Для разных стран'],\n    ['Сопровождение ВНЖ / ПМЖ', 'Полный пакет документов'],\n    ['Открытие ИП / ДОО', 'Регистрация бизнеса в Сербии'],\n    ['Открытие банковского счёта', 'Помощь и перевод документов'],\n    ['Выезд переводчика в суд', 'Судебные заседания и допросы'],\n    ['Переводчик для заключения брака', 'Присутствие на церемонии']\n  ];\n\n  static STEPS = [\n    ['Заявка', 'Отправьте документ через форму, Telegram или WhatsApp — как удобнее.'],\n    ['Ответ за 10 минут', 'Менеджер посмотрит документ, назовёт точную стоимость и срок.'],\n    ['Перевод', 'Переводим, при необходимости выполняем вёрстку, печать и заверение.'],\n    ['Получение', 'В офисе или курьером. Оплата наличными, картой — RSD, EUR, RUB.']\n  ];\n\n  static FAQS = [\n    ['Сколько стоит перевод?', 'Личные документы RU↔SR и SR↔EN — от 1 800 RSD за страницу, русский ↔ английский — от 3 000 RSD, медицинские и специализированные тексты — от 2 500 RSD. Договоры считаем по знакам: 1 800 знаков с пробелами = 1 страница. Точную стоимость сообщим после просмотра документа — до начала работы.'],\n    ['Как быстро будет готов перевод?', 'Стандартный срок — 1–3 рабочих дня в зависимости от объёма. Срочный перевод выполняем в течение 24 часов с коэффициентом ×2.'],\n    ['Чем судебный перевод отличается от нотариального?', 'В Сербии официальные переводы для нотариуса, суда, полиции и госорганов делает судебный переводчик (sudski tumač) — лицензированный специалист из реестра Минюста. Именно его синяя печать и подпись придают документу юридическую силу; нотариус сам не переводит, а принимает документ с печатью судебного переводчика.'],\n    ['Можно ли всё сделать дистанционно?', 'Да. Пришлите сканы или фото документов — мы переведём, а заверенные экземпляры передадим курьером или вы заберёте их в офисе. Электронную версию (PDF) отправим на почту.'],\n    ['Где принимают перевод с вашей печатью?', 'Печать лицензированного судебного переводчика признают сербские нотариусы, суды, МУП и миграционная служба, банки и страховые, визовые центры и консульства — в Сербии и за её пределами.']\n  ];\n\n  static RATES = {\n    std:      { 'ru-sr': 1800, 'sr-en': 1800, 'ru-en': 3000 },\n    contract: { 'ru-sr': 1800, 'sr-en': 1800, 'ru-en': 3000 },\n    med:      { 'ru-sr': 2500, 'sr-en': 2500, 'ru-en': 3500 },\n    spec:     { 'ru-sr': 2500, 'sr-en': 2500, 'ru-en': 3500 }\n  };\n\n  componentDidMount() {\n    if (window.__resources && window.__resources.heroImg) {\n      const hs = document.getElementById('hero-1b');\n      if (hs) hs.setAttribute('src', window.__resources.heroImg);\n    }\n    this._revealed = new Set();\n    this._counted = new Set();\n    this.initScrollFx();\n    // auto-advance tabs\n    this._tabTimer = setInterval(() => this.nextTab(), 6000);\n\n    this._sealIdx = -1;\n    this._stamped = false;\n  }\n\n  activateSeal(idx) {\n    if (idx === this._sealIdx) return;\n    this._sealIdx = idx;\n    document.querySelectorAll('[data-paper]').forEach(p => {\n      const i = Number(p.getAttribute('data-paper'));\n      const on = i <= idx;\n      p.style.opacity = on ? (i === 1 ? '' : '1') : '0';\n      if (i === 1) p.style.opacity = on ? '1' : '0';\n      else p.style.transform = on ? 'translateY(0)' : 'translateY(12px)';\n    });\n    const stamp = document.getElementById('stamp-seal');\n    if (!stamp) return;\n    if (idx >= 1 && !this._stamped) {\n      this._stamped = true;\n      stamp.style.animation = 'stampPress 1.5s cubic-bezier(.45,0,.2,1) both';\n      clearTimeout(this._stampT);\n      this._stampT = setTimeout(() => { stamp.style.animation = 'sealBob 5s ease-in-out infinite'; }, 1550);\n    } else if (idx < 1 && this._stamped) {\n      this._stamped = false;\n      clearTimeout(this._stampT);\n      stamp.style.animation = 'sealBob 5s ease-in-out infinite';\n    }\n  }\n\n  componentDidUpdate() {\n    // re-renders recreate DOM nodes; re-wire observers and restore revealed state\n    this.initScrollFx();\n  }\n\n  initScrollFx() {\n    if (this._io) this._io.disconnect();\n    if (this._cio) this._cio.disconnect();\n    if (this._sio) this._sio.disconnect();\n\n    // scroll reveal (persistent across re-renders via index keys)\n    this._io = new IntersectionObserver(entries => {\n      entries.forEach(en => {\n        if (en.isIntersecting) {\n          this._revealed.add(en.target.getAttribute('data-ridx'));\n          en.target.style.opacity = '1';\n          en.target.style.transform = 'none';\n          this._io.unobserve(en.target);\n        }\n      });\n    }, { threshold: 0.15 });\n    document.querySelectorAll('[data-reveal]').forEach((el, i) => {\n      el.setAttribute('data-ridx', String(i));\n      if (this._revealed.has(String(i))) {\n        el.style.transition = 'none';\n        el.style.opacity = '1';\n        el.style.transform = 'none';\n      } else {\n        this._io.observe(el);\n      }\n    });\n\n    // count-up numbers\n    const fmtNum = n => n.toLocaleString('ru-RU').replace(/\\u00a0/g, ' ');\n    this._cio = new IntersectionObserver(entries => {\n      entries.forEach(en => {\n        if (!en.isIntersecting) return;\n        const el = en.target;\n        this._cio.unobserve(el);\n        this._counted.add(el.getAttribute('data-cidx'));\n        const target = Number(el.getAttribute('data-count'));\n        const t0 = performance.now();\n        const dur = 1400;\n        const tick = now => {\n          const p = Math.min(1, (now - t0) / dur);\n          const eased = 1 - Math.pow(1 - p, 3);\n          el.textContent = fmtNum(Math.round(target * eased));\n          if (p < 1) requestAnimationFrame(tick);\n        };\n        requestAnimationFrame(tick);\n      });\n    }, { threshold: 0.6 });\n    document.querySelectorAll('[data-count]').forEach((el, i) => {\n      el.setAttribute('data-cidx', String(i));\n      if (this._counted.has(String(i))) {\n        el.textContent = fmtNum(Number(el.getAttribute('data-count')));\n      } else {\n        this._cio.observe(el);\n      }\n    });\n\n    // pinned seal section: highlight steps in view + drive the document/stamp state\n    const steps = Array.from(document.querySelectorAll('#seal-section [data-step]'));\n    this._sio = new IntersectionObserver(entries => {\n      entries.forEach(en => {\n        en.target.style.opacity = en.isIntersecting ? '1' : '.22';\n        if (en.isIntersecting) this.activateSeal(steps.indexOf(en.target));\n      });\n    }, { threshold: 0.55 });\n    steps.forEach(el => this._sio.observe(el));\n    // restore visual state after re-render\n    const cur = this._sealIdx; this._sealIdx = -2; this._stamped = false;\n    if (cur >= 0) this.activateSeal(cur);\n  }\n\n  nextTab() {\n    this.setState(s => ({ activeTab: (s.activeTab + 1) % Component.TABS.length, tabTick: s.tabTick + 1 }));\n  }\n\n  selectTab(i) {\n    clearInterval(this._tabTimer);\n    this._tabTimer = setInterval(() => this.nextTab(), 6000);\n    this.setState(s => ({ activeTab: i, tabTick: s.tabTick + 1 }));\n  }\n\n  componentWillUnmount() {\n    if (this._io) this._io.disconnect();\n    if (this._cio) this._cio.disconnect();\n    if (this._sio) this._sio.disconnect();\n    clearInterval(this._tabTimer);\n    clearTimeout(this._stampT);\n  }\n\n  setCalc(patch) {\n    this.setState(s => ({ calc: Object.assign({}, s.calc, patch) }));\n  }\n\n  renderVals() {\n    const phone = this.props.phone ?? '+381 62 1254246';\n    const c = this.state.calc;\n    const rate = Component.RATES[c.type][c.pair];\n    const isContract = c.type === 'contract';\n    const pages = isContract ? Math.max(1, Math.ceil((Number(c.chars) || 0) / 1800)) : Math.max(1, Number(c.pages) || 1);\n    const total = rate * pages * (c.urgent ? 2 : 1);\n    const fmt = n => n.toLocaleString('ru-RU').replace(/\\u00a0/g, ' ');\n    const open = this.state.faqOpen;\n    const at = this.state.activeTab;\n    const anim = this.state.tabTick % 2 === 0 ? 'contentInA .7s cubic-bezier(.2,.7,.2,1) both' : 'contentInB .7s cubic-bezier(.2,.7,.2,1) both';\n    return {\n      phone,\n      phoneHref: 'tel:' + phone.replace(/[^+\\d]/g, ''),\n      tabs: Component.TABS.map((t, i) => ({\n        label: t.label, title: t.title, desc: t.desc, pill: t.pill, slotId: t.slotId, placeholder: t.placeholder,\n        display: at === i ? 'grid' : 'none',\n        contentAnim: at === i ? anim : 'none',\n        fillAnim: at === i ? 'tabFill 6s linear forwards' : 'none',\n        labelColor: at === i ? '#F7F4ED' : '#8A8474',\n        select: () => this.selectTab(i)\n      })),\n      services: Component.SERVICES.map(([title, desc], i) => ({ title, desc, num: String(i + 1).padStart(2, '0') })),\n      steps: Component.STEPS.map(([title, desc], i) => ({ title, desc, num: String(i + 1).padStart(2, '0'), n: i + 1 })),\n      faq: Component.FAQS.map(([q, a], i) => ({\n        q, a,\n        rows: open === i ? '1fr' : '0fr',\n        markTransform: open === i ? 'rotate(45deg)' : 'rotate(0deg)',\n        toggle: () => this.setState({ faqOpen: open === i ? -1 : i })\n      })),\n      calc: {\n        pair: c.pair, type: c.type, pages: c.pages, chars: c.chars, urgent: c.urgent,\n        isContract, notContract: !isContract,\n        total: fmt(total) + ' RSD',\n        summary: pages + ' стр. × ' + fmt(rate) + ' RSD' + (c.urgent ? ' × 2 (срочно) · за 24 часа' : ' · 1–3 дня'),\n        setPair: e => this.setCalc({ pair: e.target.value }),\n        setType: e => this.setCalc({ type: e.target.value }),\n        setPages: e => this.setCalc({ pages: e.target.value }),\n        setChars: e => this.setCalc({ chars: e.target.value }),\n        toggleUrgent: () => this.setCalc({ urgent: !c.urgent })\n      }\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
